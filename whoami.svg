<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" role="img" aria-label="Animated terminal: Who Am I">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="100%" stop-color="#160c3a"/>
    </linearGradient>
    <style>
      .win   { fill:url(#bg); stroke:#00E5FF; stroke-width:2; }
      .bar   { fill:#05010d; }
      .mono  { font-family:'Fira Code','Courier New',monospace; }
      .prompt{ fill:#00E5FF; font-weight:700; }
      .key   { fill:#FFD23D; }
      .val   { fill:#c9d1d9; }
      .flag  { fill:#8AE0FF; }
      .cmt   { fill:#6b7a99; }
      .cursor{ fill:#00E5FF; }
      .title { fill:#8b949e; font-family:'Fira Code',monospace; font-size:13px; }
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .blink { animation: blink 1s step-end infinite; }
      /* reveal wipes for each line */
      .clip rect { animation: grow 0.5s steps(24) forwards; transform-origin:left; }
      @keyframes grow { from { transform:scaleX(0);} to { transform:scaleX(1);} }
      .l1 rect{ animation-delay:.2s } .l2 rect{ animation-delay:.8s }
      .l3 rect{ animation-delay:1.4s } .l4 rect{ animation-delay:2.0s }
      .l5 rect{ animation-delay:2.6s } .l6 rect{ animation-delay:3.2s }
      .l7 rect{ animation-delay:3.8s } .l8 rect{ animation-delay:4.4s }
      .clip > g { opacity:0; animation: show 0s forwards; }
      .l1>g{animation-delay:.2s}.l2>g{animation-delay:.8s}.l3>g{animation-delay:1.4s}
      .l4>g{animation-delay:2.0s}.l5>g{animation-delay:2.6s}.l6>g{animation-delay:3.2s}
      .l7>g{animation-delay:3.8s}.l8>g{animation-delay:4.4s}
      @keyframes show { to { opacity:1 } }
    </style>

    <clipPath id="c1"><rect x="40" y="78"  width="0" height="26"><animate attributeName="width" from="0" to="820" begin="0.2s"  dur="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c2"><rect x="40" y="110" width="0" height="26"><animate attributeName="width" from="0" to="820" begin="0.8s"  dur="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c3"><rect x="40" y="142" width="0" height="26"><animate attributeName="width" from="0" to="820" begin="1.4s"  dur="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c4"><rect x="40" y="174" width="0" height="26"><animate attributeName="width" from="0" to="820" begin="2.0s"  dur="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c5"><rect x="40" y="206" width="0" height="26"><animate attributeName="width" from="0" to="820" begin="2.6s"  dur="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c6"><rect x="40" y="238" width="0" height="26"><animate attributeName="width" from="0" to="820" begin="3.2s"  dur="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c7"><rect x="40" y="270" width="0" height="26"><animate attributeName="width" from="0" to="820" begin="3.8s"  dur="0.5s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- window -->
  <rect class="win" x="4" y="4" width="892" height="332" rx="14"/>
  <!-- title bar -->
  <path class="bar" d="M4 18 A14 14 0 0 1 18 4 H882 A14 14 0 0 1 896 18 V40 H4 Z"/>
  <circle cx="26" cy="22" r="6" fill="#FF5F56"/>
  <circle cx="48" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="70" cy="22" r="6" fill="#27C93F"/>
  <text class="title" x="450" y="27" text-anchor="middle">wajeeh@github ~ whoami</text>

  <g class="mono" font-size="17">
    <!-- line 1 -->
    <g clip-path="url(#c1)"><text x="40" y="96"><tspan class="key">name</tspan><tspan class="val">:      Wajeeh Imran</tspan></text></g>
    <g clip-path="url(#c2)"><text x="40" y="128"><tspan class="key">role</tspan><tspan class="val">:      CS Undergraduate @ FAST NUCES Islamabad</tspan></text></g>
    <g clip-path="url(#c3)"><text x="40" y="160"><tspan class="key">location</tspan><tspan class="val">:  Pakistan </tspan><tspan class="flag">🇵🇰</tspan></text></g>
    <g clip-path="url(#c4)"><text x="40" y="192"><tspan class="key">focus</tspan><tspan class="val">:     Building innovative ideas &amp; real-world products</tspan></text></g>
    <g clip-path="url(#c5)"><text x="40" y="224"><tspan class="key">into</tspan><tspan class="val">:      AI Dev </tspan><tspan class="flag">•</tspan><tspan class="val"> Robotics </tspan><tspan class="flag">•</tspan><tspan class="val"> Automation</tspan></text></g>
    <g clip-path="url(#c6)"><text x="40" y="256"><tspan class="key">mindset</tspan><tspan class="val">:   Passionate developer who likes code that moves things</tspan></text></g>
    <g clip-path="url(#c7)"><text x="40" y="288"><tspan class="key">status</tspan><tspan class="val">:    Always open to collaborate on interesting projects</tspan></text></g>
  </g>

  <!-- blinking cursor appears after last line -->
  <rect class="cursor" x="40" y="304" width="11" height="20" opacity="0">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.72;0.73" dur="6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;1;0;0;1" begin="4.4s" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
